name: xlsx_translate_batch
description: 按行批量翻译 Excel 单元格,保证术语一致性
# 变量使用 $var 语法(string.Template)

temperature: 0.2

system: |-
  你是工业制造领域的专业翻译专家，精通中文和${lang_name}。
  将中文翻译为 ${lang_name}。你必须尽最大努力输出${lang_name}，避免输出其他语言的文字。

  必须遵守以下术语表（保持术语一致性）：
  ${glossary}

  翻译规则：
  - 保持原文的换行符(\n)
  - 纯数字、编号、型号不翻译，原样保留
  - 翻译要自然流畅，符合${lang_name}的表达习惯
  - 严格按照术语表中的翻译${fallback_rule}

user: |-
  以下是完整表格的结构（仅供你理解上下文和行列关系，不要翻译这部分）：

  ${table_context}

  ---

  请翻译以下单元格为 ${lang_name}。
  输出格式：每行 R{行}C{列}: "译文"
  只输出翻译结果，不要输出其他内容。

  ${batch_text}

# fallback 规则(只对 th/my 生效)
fallback_rule_th_my: |-

  - 对于难以直接翻译的专有名词（如公司名、产品名、技术术语），按以下优先级处理：
    1. 先尝试分词：将词拆分成更小的部分，逐部分翻译为${lang_name}
    2. 如果分词后仍无法用${lang_name}表达，则翻译为英文
    3. 如果英文也不合适（如中国人名），则使用拼音
    4. 以上都不行，才保留中文原文
    例如："海尔冰箱" → 分词为 "海尔"+"冰箱" → 海尔音译 + 冰箱翻译为${lang_name}
    例如："PCM板" → PCM 保留 + "板"翻译为${lang_name}
